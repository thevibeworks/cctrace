name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # openssl backs the MITM CA/leaf generation exercised by the tests.
      - name: Check openssl
        run: openssl version

      - name: Install
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test
